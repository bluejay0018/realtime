<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Savvy Trader Feed</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-app: #ffffff;
      --bg-sidebar: #f7f7f5;
      --bg-card: #f8f8f7;
      --bg-feed: #f3f4f6;
      --bg-input: #ffffff;
      --border: #e9e9e7;
      --border-strong: #d4d4d2;
      --text-primary: #37352f;
      --text-secondary: #787774;
      --text-muted: #9b9a97;
      --accent: #5e4cce;
      --accent-bg: #e8e4ff;
      --buy: #2e7d32;     --buy-bg: #e8f5e9;
      --sell: #c62828;    --sell-bg: #ffebee;
      --comment: #5e4cce; --comment-bg: #e8e4ff;
      --status-live: #16a34a;
      --status-paused: #d97706;
      --status-error: #dc2626;
    }

    [data-theme="dark"] {
      --bg-app: #191919;
      --bg-sidebar: #202020;
      --bg-card: #2a2a2a;
      --bg-feed: #1a1a1a;
      --bg-input: #2a2a2a;
      --border: #333333;
      --border-strong: #444444;
      --text-primary: #e8e6e3;
      --text-secondary: #9b9a97;
      --text-muted: #6e6d6a;
      --accent: #a5b4fc;
      --accent-bg: #2a2547;
      --buy: #85c88a;     --buy-bg: #1d3a1f;
      --sell: #f08080;    --sell-bg: #3a1d1d;
      --comment: #a5b4fc; --comment-bg: #2a2547;
    }

    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-app);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
    }

    header {
      background: var(--bg-app);
      border-bottom: 1px solid var(--border);
      padding: 0 20px;
      height: 52px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky; top: 0; z-index: 10;
    }
    header h1 { font-size: 15px; font-weight: 700; color: var(--text-primary); }
    .header-right { display: flex; align-items: center; gap: 14px; }
    .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-secondary); }
    .status-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--status-live); }
    .status.paused .status-dot { background: var(--status-paused); }
    .status.error .status-dot { background: var(--status-error); }
    .last-check { font-size: 11px; color: var(--text-muted); }

    .theme-toggle {
      background: none; border: 1px solid var(--border); border-radius: 6px;
      width: 30px; height: 30px; cursor: pointer; font-size: 14px;
      color: var(--text-secondary); display: flex; align-items: center; justify-content: center;
    }
    .theme-toggle:hover { background: var(--bg-feed); }

    .app { display: grid; grid-template-columns: 290px 1fr; height: calc(100vh - 52px); }

    .sidebar {
      background: var(--bg-sidebar);
      border-right: 1px solid var(--border);
      overflow-y: auto;
      padding: 14px;
      display: flex; flex-direction: column; gap: 14px;
    }

    .panel { background: var(--bg-app); border: 1px solid var(--border); border-radius: 8px; padding: 12px; }
    .panel h2 {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--text-muted); margin-bottom: 10px;
    }

    label.field { font-size: 11px; color: var(--text-secondary); display: block; margin-bottom: 4px; }
    input, select {
      background: var(--bg-input); border: 1px solid var(--border-strong); border-radius: 5px;
      color: var(--text-primary); padding: 6px 9px; font-size: 12px; width: 100%; font-family: inherit;
    }
    input:focus, select:focus { outline: none; border-color: var(--accent); }
    .field-group { margin-bottom: 10px; }
    .field-group:last-child { margin-bottom: 0; }
    .note { font-size: 11px; color: var(--text-muted); margin-top: 6px; line-height: 1.5; }

    .row { display: flex; align-items: center; gap: 8px; padding: 5px 0; }
    .row input[type=checkbox] { accent-color: var(--accent); width: 14px; height: 14px; cursor: pointer; flex-shrink: 0; }
    .row label { font-size: 12px; color: var(--text-primary); flex: 1; cursor: pointer; }
    .row .count { font-size: 10px; color: var(--text-muted); background: var(--bg-feed); padding: 1px 7px; border-radius: 10px; }

    .btn {
      background: var(--accent); color: white; border: none; border-radius: 6px;
      padding: 7px 12px; font-size: 12px; font-weight: 600; cursor: pointer; width: 100%;
      font-family: inherit;
    }
    .btn:hover { filter: brightness(1.05); }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn.secondary { background: var(--bg-feed); color: var(--text-primary); border: 1px solid var(--border); }
    .btn.danger { background: transparent; color: var(--sell); border: 1px solid var(--border); }
    .btn-row { display: flex; gap: 6px; }
    .btn-row .btn { flex: 1; }

    .feed-area { display: flex; flex-direction: column; overflow: hidden; background: var(--bg-feed); }
    .feed-toolbar {
      padding: 10px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 10px; background: var(--bg-app);
    }
    .count-pill { background: var(--accent-bg); color: var(--accent); font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; }
    .new-pill { background: var(--buy-bg); color: var(--buy); font-size: 11px; font-weight: 700; padding: 2px 9px; border-radius: 10px; display: none; }
    .new-pill.show { display: inline-block; }
    .spacer { flex: 1; }
    .feed-toolbar input[type=text] { width: 180px; }
    .feed-toolbar select { width: 130px; }

    .feed { flex: 1; overflow-y: auto; padding: 16px 18px; display: flex; flex-direction: column; gap: 10px; }
    .empty { text-align: center; padding: 60px 20px; color: var(--text-muted); font-size: 13px; }

    .card {
      background: var(--bg-card); border: 1px solid var(--border); border-radius: 10px; padding: 14px;
      transition: border-color 0.15s;
    }
    .card.new { border-color: var(--accent); animation: slidein 0.3s ease; }
    @keyframes slidein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }
    .card-head { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .avatar {
      width: 26px; height: 26px; border-radius: 6px;
      background: var(--accent-bg); color: var(--accent);
      display: flex; align-items: center; justify-content: center;
      font-size: 11px; font-weight: 700; flex-shrink: 0;
    }
    .portfolio-name { font-size: 13px; font-weight: 600; color: var(--text-primary); }
    .timestamp { font-size: 11px; color: var(--text-muted); }
    .pill { font-size: 10px; font-weight: 600; padding: 2px 8px; border-radius: 4px; }
    .pill.buy { background: var(--buy-bg); color: var(--buy); }
    .pill.sell { background: var(--sell-bg); color: var(--sell); }
    .pill.comment { background: var(--comment-bg); color: var(--comment); }
    .trade-line { font-size: 12px; color: var(--text-secondary); margin-bottom: 8px; }
    .ticker { font-weight: 700; color: var(--text-primary); }
    .change.up { color: var(--buy); font-weight: 600; }
    .change.down { color: var(--sell); font-weight: 600; }
    .body-text { font-size: 13px; color: var(--text-primary); line-height: 1.65; white-space: pre-wrap; word-break: break-word; }
    .post-image { margin-top: 10px; border-radius: 8px; max-width: 100%; max-height: 280px; object-fit: contain; border: 1px solid var(--border); display: block; }
    .card-actions { margin-top: 10px; }
    .analyze-btn {
      background: var(--accent-bg); color: var(--accent); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 12px; font-size: 11px; font-weight: 600; cursor: pointer;
      font-family: inherit;
    }
    .analyze-btn:hover { filter: brightness(1.03); }
    .analyze-btn:disabled { opacity: 0.6; cursor: wait; }
    .analysis { margin-top: 10px; background: var(--accent-bg); border-radius: 6px; padding: 10px 12px; font-size: 12px; color: var(--text-primary); line-height: 1.6; }
    .analysis.error { background: var(--sell-bg); color: var(--sell); }
    .analysis-label { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.06em; color: var(--accent); margin-bottom: 4px; }

    .auth-status { font-size: 12px; padding: 8px; border-radius: 6px; margin-top: 8px; display: none; }
    .auth-status.show { display: block; }
    .auth-status.error { background: var(--sell-bg); color: var(--sell); }
  </style>
</head>
<body data-theme="light">
  <header>
    <h1>Today's View</h1>
    <div class="header-right">
      <div class="status" id="status">
        <span class="status-dot"></span>
        <span id="status-text">Idle</span>
      </div>
      <span class="last-check" id="last-check"></span>
      <button class="theme-toggle" id="theme-toggle" title="Toggle theme">◐</button>
    </div>
  </header>

  <main class="app">
    <aside class="sidebar">
      <div class="panel">
        <h2>Authentication</h2>
        <div class="field-group">
          <label class="field">Cloudflare Worker URL</label>
          <input type="text" id="worker-url" placeholder="https://savvy-trader-proxy.you.workers.dev">
        </div>
        <div class="field-group">
          <label class="field">Savvy Trader JWT</label>
          <input type="password" id="jwt-token" placeholder="eyJhbGc...">
          <div class="note">savvytrader.com → F12 → Application → Local Storage → copy <code>idToken</code></div>
        </div>
        <div class="field-group">
          <label class="field">Anthropic API Key</label>
          <input type="password" id="anthropic-key" placeholder="sk-ant-...">
          <div class="note">Get one at console.anthropic.com</div>
        </div>
        <div id="auth-status" class="auth-status"></div>
      </div>

      <div class="panel">
        <h2>Filters</h2>
        <div class="row">
          <input type="checkbox" id="filter-comment" checked>
          <label for="filter-comment">Comments / Deep-dives</label>
          <span class="count" id="count-comment">0</span>
        </div>
        <div class="row">
          <input type="checkbox" id="filter-buy" checked>
          <label for="filter-buy">Buys</label>
          <span class="count" id="count-buy">0</span>
        </div>
        <div class="row">
          <input type="checkbox" id="filter-sell" checked>
          <label for="filter-sell">Sells</label>
          <span class="count" id="count-sell">0</span>
        </div>
      </div>

      <div class="panel">
        <h2>Portfolios</h2>
        <div id="portfolio-list">
          <div class="note">Click Start to load.</div>
        </div>
        <div class="btn-row" style="margin-top:10px">
          <button class="btn secondary" id="portfolios-all">All</button>
          <button class="btn secondary" id="portfolios-none">None</button>
        </div>
      </div>

      <div class="panel">
        <h2>Polling</h2>
        <div class="field-group">
          <label class="field">Interval</label>
          <select id="poll-interval">
            <option value="15000">15 seconds</option>
            <option value="30000" selected>30 seconds</option>
            <option value="60000">1 minute</option>
            <option value="120000">2 minutes</option>
            <option value="300000">5 minutes</option>
          </select>
        </div>
        <div class="field-group">
          <label class="field">Initial load count</label>
          <input type="number" id="initial-count" min="5" max="50" value="20">
        </div>
        <button class="btn" id="start-btn">Start</button>
        <div class="btn-row" style="margin-top:6px">
          <button class="btn secondary" id="pause-btn" disabled>Pause</button>
          <button class="btn danger" id="clear-btn">Clear</button>
        </div>
      </div>
    </aside>

    <section class="feed-area">
      <div class="feed-toolbar">
        <span class="count-pill" id="total-count">0 posts</span>
        <span class="new-pill" id="new-pill">+0 new</span>
        <div class="spacer"></div>
        <input type="text" id="search" placeholder="Search ticker or text...">
        <select id="sort-order">
          <option value="desc" selected>Newest first</option>
          <option value="asc">Oldest first</option>
        </select>
      </div>
      <div class="feed" id="feed">
        <div class="empty">Fill in credentials and click Start to load the feed.</div>
      </div>
    </section>
  </main>

  <script>
  'use strict';

  // ============================================================
  // CONSTANTS & STATE
  // ============================================================
  const SETTINGS_KEY = 'savvy.settings.v1';
  const THEME_KEY    = 'savvy.theme';
  const POSTS_KEY    = 'savvy.posts.v1';
  const CLAUDE_KEY   = 'savvy.claude.v1';
  const MAX_STORED_POSTS = 500;

  const state = {
    posts: [],
    seenIds: new Set(),
    portfolios: [],
    selectedPortfolios: new Set(),
    claudeCache: new Map(),
    pollHandle: null,
    pollMs: 30000,
    initialCount: 20,
    newCount: 0,
    statusMode: 'idle',
  };

  // ============================================================
  // STORAGE
  // ============================================================
  function loadSettings() {
    try {
      const raw = localStorage.getItem(SETTINGS_KEY);
      return raw ? JSON.parse(raw) : {};
    } catch { return {}; }
  }
  function saveSettings(patch) {
    const current = loadSettings();
    const next = { ...current, ...patch };
    localStorage.setItem(SETTINGS_KEY, JSON.stringify(next));
  }

  function persistPosts() {
    try {
      // Sort by orderDate desc and keep the most recent MAX_STORED_POSTS
      const sorted = [...state.posts].sort((a, b) =>
        new Date(b.orderDate || 0) - new Date(a.orderDate || 0)
      ).slice(0, MAX_STORED_POSTS);
      localStorage.setItem(POSTS_KEY, JSON.stringify(sorted));
    } catch (err) {
      console.warn('Failed to persist posts:', err);
    }
  }
  function persistClaude() {
    try {
      const entries = Array.from(state.claudeCache.entries());
      localStorage.setItem(CLAUDE_KEY, JSON.stringify(entries));
    } catch (err) {
      console.warn('Failed to persist Claude cache:', err);
    }
  }
  function loadStoredPosts() {
    try {
      const raw = localStorage.getItem(POSTS_KEY);
      if (!raw) return;
      const stored = JSON.parse(raw);
      if (!Array.isArray(stored)) return;
      for (const post of stored) {
        if (post && post.id != null && !state.seenIds.has(post.id)) {
          state.seenIds.add(post.id);
          state.posts.push(post);
        }
      }
    } catch (err) {
      console.warn('Failed to load stored posts:', err);
    }
  }
  function loadStoredClaude() {
    try {
      const raw = localStorage.getItem(CLAUDE_KEY);
      if (!raw) return;
      const entries = JSON.parse(raw);
      if (!Array.isArray(entries)) return;
      state.claudeCache = new Map(entries);
    } catch (err) {
      console.warn('Failed to load stored Claude cache:', err);
    }
  }

  // ============================================================
  // THEME
  // ============================================================
  function applyTheme(theme) {
    document.body.dataset.theme = theme;
    document.getElementById('theme-toggle').textContent = theme === 'dark' ? '☀' : '☾';
    localStorage.setItem(THEME_KEY, theme);
  }
  function initTheme() {
    const saved = localStorage.getItem(THEME_KEY);
    if (saved === 'dark' || saved === 'light') return applyTheme(saved);
    const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(prefersDark ? 'dark' : 'light');
  }
  function toggleTheme() {
    applyTheme(document.body.dataset.theme === 'dark' ? 'light' : 'dark');
  }

  // ============================================================
  // API CLIENT (via Cloudflare Worker)
  // ============================================================
  function getCreds() {
    const workerUrl    = document.getElementById('worker-url').value.trim().replace(/\/+$/, '');
    const jwt          = document.getElementById('jwt-token').value.trim();
    const anthropicKey = document.getElementById('anthropic-key').value.trim();
    return { workerUrl, jwt, anthropicKey };
  }
  function credsReady() {
    const { workerUrl, jwt, anthropicKey } = getCreds();
    return Boolean(workerUrl && jwt && anthropicKey);
  }

  async function fetchSavvy(path) {
    const { workerUrl, jwt } = getCreds();
    if (!workerUrl) throw new Error('Worker URL not set');
    if (!jwt) throw new Error('JWT not set');
    const res = await fetch(workerUrl + path, {
      headers: { 'Authorization': 'Bearer ' + jwt },
    });
    if (res.status === 401) {
      const err = new Error('Token expired');
      err.code = 'TOKEN_EXPIRED';
      throw err;
    }
    if (!res.ok) {
      const err = new Error('Savvy API error ' + res.status);
      err.code = 'API_ERROR';
      err.status = res.status;
      throw err;
    }
    return res.json();
  }

  async function fetchClaude(post) {
    const { workerUrl, anthropicKey } = getCreds();
    if (!workerUrl) throw new Error('Worker URL not set');
    if (!anthropicKey) throw new Error('Anthropic key not set');
    const res = await fetch(workerUrl + '/claude', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ post, apiKey: anthropicKey }),
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.error || 'Claude error');
    return data.analysis;
  }

  function buildPostText(post) {
    const parts = [];
    if (post.portfolio?.name) parts.push('Portfolio: ' + post.portfolio.name);
    if (post.transactionType) parts.push('Type: ' + post.transactionType);
    if (post.symbol) parts.push('Symbol: ' + post.symbol);
    if (post.pricePerShare) parts.push('Price: $' + post.pricePerShare);
    if (post.quantity) parts.push('Quantity: ' + post.quantity);
    if (post.holdingPercentAllocation != null) parts.push('Allocation: ' + post.holdingPercentAllocation + '%');
    if (post.holdingPercentChange != null) parts.push('Change: ' + post.holdingPercentChange + '%');
    if (post.comment) parts.push('Post: ' + post.comment);
    return parts.join('\n');
  }

  // ============================================================
  // STATUS
  // ============================================================
  function setStatus(mode, text) {
    state.statusMode = mode;
    const el = document.getElementById('status');
    el.classList.remove('paused', 'error');
    if (mode === 'paused') el.classList.add('paused');
    if (mode === 'error')  el.classList.add('error');
    document.getElementById('status-text').textContent = text;
  }
  function setLastCheck(date) {
    document.getElementById('last-check').textContent = date
      ? 'Last check: ' + date.toLocaleTimeString()
      : '';
  }
  function setAuthError(msg) {
    const el = document.getElementById('auth-status');
    if (!msg) { el.classList.remove('show', 'error'); el.textContent = ''; return; }
    el.classList.add('show', 'error');
    el.textContent = msg;
  }

  // ============================================================
  // POLLING
  // ============================================================
  async function tick() {
    try {
      const data = await fetchSavvy('/core/transactions/subscribed?limit=20');
      ingestPosts(data, false);
      setStatus('live', 'Live');
      setLastCheck(new Date());
    } catch (err) {
      if (err.code === 'TOKEN_EXPIRED') {
        stop();
        setStatus('error', 'Token expired');
        setAuthError('Token expired — paste a fresh idToken into the JWT field.');
        return;
      }
      setStatus('error', 'Error: ' + err.message);
    }
  }

  async function start() {
    setAuthError('');
    if (!credsReady()) {
      setAuthError('Fill in Worker URL, JWT, and Anthropic API key first.');
      return;
    }
    const limit = Number(document.getElementById('initial-count').value) || 20;
    state.pollMs = Number(document.getElementById('poll-interval').value) || 30000;

    setStatus('live', 'Loading...');
    try {
      const portfolios = await fetchSavvy('/core/portfolios/subscribed');
      ingestPortfolios(portfolios);

      const posts = await fetchSavvy('/core/transactions/subscribed?limit=' + limit);
      ingestPosts(posts, true);
      setStatus('live', 'Live');
      setLastCheck(new Date());
    } catch (err) {
      if (err.code === 'TOKEN_EXPIRED') {
        setStatus('error', 'Token expired');
        setAuthError('Token expired — paste a fresh idToken into the JWT field.');
        return;
      }
      setStatus('error', 'Error: ' + err.message);
      return;
    }

    if (state.pollHandle) clearInterval(state.pollHandle);
    state.pollHandle = setInterval(tick, state.pollMs);
    document.getElementById('start-btn').disabled = true;
    document.getElementById('pause-btn').disabled = false;
  }

  function stop() {
    if (state.pollHandle) { clearInterval(state.pollHandle); state.pollHandle = null; }
    setStatus('paused', 'Paused');
    document.getElementById('start-btn').disabled = false;
    document.getElementById('pause-btn').disabled = true;
  }

  function clearAll() {
    stop();
    state.posts = [];
    state.seenIds.clear();
    state.claudeCache.clear();
    state.newCount = 0;
    localStorage.removeItem(POSTS_KEY);
    localStorage.removeItem(CLAUDE_KEY);
    renderFeed();
    updateCounts();
    setStatus('idle', 'Idle');
    setLastCheck(null);
  }

  // ============================================================
  // PORTFOLIOS
  // ============================================================
  function ingestPortfolios(list) {
    state.portfolios = Array.isArray(list) ? list : [];
    // First load: select all by default. Subsequent loads: preserve selection.
    if (state.selectedPortfolios.size === 0) {
      state.portfolios.forEach(p => state.selectedPortfolios.add(p.id));
    }
    renderPortfolios();
  }
  function renderPortfolios() {
    const container = document.getElementById('portfolio-list');
    if (state.portfolios.length === 0) {
      container.innerHTML = '<div class="note">No subscribed portfolios.</div>';
      return;
    }
    container.innerHTML = state.portfolios.map(p => {
      const checked = state.selectedPortfolios.has(p.id) ? 'checked' : '';
      return `
        <div class="row">
          <input type="checkbox" id="pf-${p.id}" data-pf="${p.id}" ${checked}>
          <label for="pf-${p.id}">${escapeHtml(p.name || ('#' + p.id))}</label>
        </div>
      `;
    }).join('');
    container.querySelectorAll('input[data-pf]').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = Number(e.target.dataset.pf);
        if (e.target.checked) state.selectedPortfolios.add(id);
        else state.selectedPortfolios.delete(id);
        renderFeed();
      });
    });
  }
  function selectAllPortfolios(selected) {
    state.selectedPortfolios.clear();
    if (selected) state.portfolios.forEach(p => state.selectedPortfolios.add(p.id));
    renderPortfolios();
    renderFeed();
  }

  function escapeHtml(s) {
    return String(s ?? '').replace(/[&<>"']/g, c => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;',
    }[c]));
  }

  // ============================================================
  // POSTS — ingest + render
  // ============================================================
  function ingestPosts(list, initial) {
    if (!Array.isArray(list)) return;
    let added = 0;
    for (const post of list) {
      if (!post || post.id == null) continue;
      if (state.seenIds.has(post.id)) continue;
      state.seenIds.add(post.id);
      state.posts.push(post);
      if (!initial) added++;
    }
    if (!initial && added > 0) {
      state.newCount += added;
      updateNewPill();
    }
    persistPosts();
    updateCounts();
    renderFeed();
  }

  function getFilteredPosts() {
    const showComment = document.getElementById('filter-comment').checked;
    const showBuy     = document.getElementById('filter-buy').checked;
    const showSell    = document.getElementById('filter-sell').checked;
    const search      = document.getElementById('search').value.trim().toLowerCase();
    const sort        = document.getElementById('sort-order').value;

    const typeAllowed = t => (t === 'comment' && showComment) || (t === 'buy' && showBuy) || (t === 'sell' && showSell);

    const filtered = state.posts.filter(p => {
      if (!typeAllowed(p.transactionType)) return false;
      if (p.portfolioId != null && state.selectedPortfolios.size > 0 && !state.selectedPortfolios.has(p.portfolioId)) return false;
      if (search) {
        const haystack = [
          p.symbol, p.comment, p.portfolio?.name,
        ].filter(Boolean).join(' ').toLowerCase();
        if (!haystack.includes(search)) return false;
      }
      return true;
    });

    filtered.sort((a, b) => {
      const da = new Date(a.orderDate || 0).getTime();
      const db = new Date(b.orderDate || 0).getTime();
      return sort === 'asc' ? da - db : db - da;
    });

    return filtered;
  }

  function relativeTime(iso) {
    if (!iso) return '';
    const then = new Date(iso).getTime();
    const diff = Date.now() - then;
    const s = Math.floor(diff / 1000);
    if (s < 60)   return s + 's ago';
    const m = Math.floor(s / 60);
    if (m < 60)   return m + 'm ago';
    const h = Math.floor(m / 60);
    if (h < 24)   return h + 'h ago';
    const d = Math.floor(h / 24);
    if (d < 7)    return d + 'd ago';
    return new Date(iso).toLocaleDateString();
  }

  function pillLabel(post) {
    if (post.transactionType === 'buy')  return 'Added position';
    if (post.transactionType === 'sell') {
      return (post.holdingPercentAllocation === 0) ? 'Exited position' : 'Trimmed position';
    }
    return 'Commentary';
  }

  function renderCard(post) {
    const t = post.transactionType || 'comment';
    const pname = post.portfolio?.name || '#' + (post.portfolioId ?? '?');
    const initial = (pname[0] || '?').toUpperCase();
    const time = relativeTime(post.orderDate);

    let tradeLine = '';
    if (t === 'buy' || t === 'sell') {
      const bits = [];
      if (post.symbol) bits.push(`<span class="ticker">${escapeHtml(post.symbol)}</span>`);
      if (post.quantity != null && post.pricePerShare != null)
        bits.push(`${escapeHtml(post.quantity)} shares @ $${escapeHtml(post.pricePerShare)}`);
      if (post.holdingPercentChange != null) {
        const up = Number(post.holdingPercentChange) >= 0;
        bits.push(`<span class="change ${up ? 'up' : 'down'}">${up ? '+' : ''}${escapeHtml(post.holdingPercentChange)}%</span>`);
      }
      if (post.holdingPercentAllocation != null) bits.push(`${escapeHtml(post.holdingPercentAllocation)}% alloc`);
      tradeLine = `<div class="trade-line">${bits.join(' · ')}</div>`;
    }

    const images = (post.images || [])
      .filter(img => img && img.url)
      .map(img => `<img class="post-image" src="${escapeHtml(img.url)}" alt="">`)
      .join('');

    return `
      <div class="card" data-id="${post.id}">
        <div class="card-head">
          <div class="avatar">${escapeHtml(initial)}</div>
          <div style="flex:1">
            <div class="portfolio-name">${escapeHtml(pname)}</div>
            <div class="timestamp">${escapeHtml(time)}</div>
          </div>
          <span class="pill ${t}">${escapeHtml(pillLabel(post))}</span>
        </div>
        ${tradeLine}
        ${post.comment ? `<div class="body-text">${escapeHtml(post.comment)}</div>` : ''}
        ${images}
        <div class="card-actions">
          <button class="analyze-btn" data-analyze="${post.id}">✦ Ask Claude</button>
        </div>
        <div class="analysis-container" data-analysis="${post.id}"></div>
      </div>
    `;
  }

  function renderFeed() {
    const feed = document.getElementById('feed');
    const posts = getFilteredPosts();
    if (posts.length === 0) {
      feed.innerHTML = `<div class="empty">${
        state.posts.length === 0
          ? 'Fill in credentials and click Start to load the feed.'
          : 'No posts match the current filters.'
      }</div>`;
      return;
    }
    feed.innerHTML = posts.map(renderCard).join('');
    // Re-attach cached Claude results
    state.claudeCache.forEach((analysis, id) => {
      const container = feed.querySelector(`[data-analysis="${id}"]`);
      if (container) container.innerHTML = renderAnalysis(analysis, false);
    });
  }

  function renderAnalysis(text, isError) {
    return `<div class="analysis ${isError ? 'error' : ''}">
      <div class="analysis-label">${isError ? 'Error' : 'Claude analysis'}</div>
      ${escapeHtml(text)}
    </div>`;
  }

  function updateCounts() {
    let comment = 0, buy = 0, sell = 0;
    for (const p of state.posts) {
      if (p.transactionType === 'comment') comment++;
      else if (p.transactionType === 'buy') buy++;
      else if (p.transactionType === 'sell') sell++;
    }
    document.getElementById('count-comment').textContent = comment;
    document.getElementById('count-buy').textContent = buy;
    document.getElementById('count-sell').textContent = sell;
    document.getElementById('total-count').textContent = state.posts.length + ' posts';
  }

  function updateNewPill() {
    const pill = document.getElementById('new-pill');
    if (state.newCount > 0) {
      pill.textContent = '+' + state.newCount + ' new';
      pill.classList.add('show');
    } else {
      pill.classList.remove('show');
    }
  }
  function clearNewBadge() {
    state.newCount = 0;
    updateNewPill();
  }

  // ============================================================
  // CLAUDE ANALYSIS
  // ============================================================
  async function handleAnalyzeClick(postId) {
    const post = state.posts.find(p => p.id === postId);
    if (!post) return;
    const container = document.querySelector(`[data-analysis="${postId}"]`);
    const btn       = document.querySelector(`[data-analyze="${postId}"]`);

    // Cache hit
    if (state.claudeCache.has(postId)) {
      container.innerHTML = renderAnalysis(state.claudeCache.get(postId), false);
      return;
    }

    btn.disabled = true;
    btn.textContent = '✦ Analyzing...';
    container.innerHTML = '';

    try {
      const analysis = await fetchClaude(buildPostText(post));
      state.claudeCache.set(postId, analysis);
      persistClaude();
      container.innerHTML = renderAnalysis(analysis, false);
    } catch (err) {
      container.innerHTML = renderAnalysis('Claude error: ' + err.message + ' — click again to retry.', true);
    } finally {
      btn.disabled = false;
      btn.textContent = '✦ Ask Claude';
    }
  }

  // ============================================================
  // INIT
  // ============================================================
  function init() {
    initTheme();
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

    // Restore stored posts + Claude cache
    loadStoredPosts();
    loadStoredClaude();

    // Restore auth fields
    const s = loadSettings();
    if (s.workerUrl)   document.getElementById('worker-url').value   = s.workerUrl;
    if (s.jwtToken)    document.getElementById('jwt-token').value    = s.jwtToken;
    if (s.anthropicKey)document.getElementById('anthropic-key').value= s.anthropicKey;
    if (s.pollMs)      document.getElementById('poll-interval').value= String(s.pollMs);
    if (s.initialCount)document.getElementById('initial-count').value= String(s.initialCount);

    // Persist on change
    document.getElementById('worker-url').addEventListener('change', e => saveSettings({ workerUrl: e.target.value.trim() }));
    document.getElementById('jwt-token').addEventListener('change', e => saveSettings({ jwtToken: e.target.value.trim() }));
    document.getElementById('anthropic-key').addEventListener('change', e => saveSettings({ anthropicKey: e.target.value.trim() }));
    document.getElementById('poll-interval').addEventListener('change', e => saveSettings({ pollMs: Number(e.target.value) }));
    document.getElementById('initial-count').addEventListener('change', e => saveSettings({ initialCount: Number(e.target.value) }));

    document.getElementById('start-btn').addEventListener('click', start);
    document.getElementById('pause-btn').addEventListener('click', stop);
    document.getElementById('clear-btn').addEventListener('click', clearAll);

    document.getElementById('portfolios-all').addEventListener('click',  () => selectAllPortfolios(true));
    document.getElementById('portfolios-none').addEventListener('click', () => selectAllPortfolios(false));

    document.getElementById('filter-comment').addEventListener('change', renderFeed);
    document.getElementById('filter-buy').addEventListener('change', renderFeed);
    document.getElementById('filter-sell').addEventListener('change', renderFeed);
    document.getElementById('search').addEventListener('input', renderFeed);
    document.getElementById('sort-order').addEventListener('change', renderFeed);
    document.getElementById('feed').addEventListener('scroll', clearNewBadge);
    document.getElementById('feed').addEventListener('click', clearNewBadge);

    document.getElementById('feed').addEventListener('click', e => {
      const btn = e.target.closest('[data-analyze]');
      if (!btn) return;
      handleAnalyzeClick(Number(btn.dataset.analyze));
    });

    // Render anything we restored from localStorage
    if (state.posts.length > 0) {
      updateCounts();
      renderFeed();
    }

    setStatus('idle', 'Idle');
  }

  document.addEventListener('DOMContentLoaded', init);
  </script>
</body>
